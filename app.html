<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPL Auction Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .container {
      width: min(1200px, 92%);
      margin: 0 auto;
      padding: 24px 0 40px;
    }
    .hero {
      padding: 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, #1e293b, #111827);
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      margin-bottom: 24px;
    }
    h1 { margin: 0 0 10px; font-size: 32px; }
    .subtext { margin: 0; color: #cbd5e1; line-height: 1.6; }
    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      background: #111827;
      padding: 18px;
      border-radius: 18px;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    label { font-size: 14px; color: #cbd5e1; }
    input, select, button {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
    }
    input, select {
      background: #1f2937;
      color: #f8fafc;
      border: 1px solid rgba(255,255,255,0.08);
    }
    button {
      cursor: pointer;
      background: #f59e0b;
      color: #111827;
      font-weight: 700;
    }
    button:hover { opacity: 0.95; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .count { color: #cbd5e1; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }
    .card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
    }
    .player-photo {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #1f2937;
    }
    .content {
      padding: 16px;
    }
    .name-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 12px;
    }
    .player-name { font-size: 22px; margin: 0; }
    .chip {
      background: #1d4ed8;
      color: white;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .meta-box {
      background: #1f2937;
      border-radius: 14px;
      padding: 10px 12px;
    }
    .meta-box small {
      display: block;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    .meta-box strong { font-size: 16px; }
    .bid-form {
      display: grid;
      gap: 10px;
    }
    .inline-note {
      font-size: 12px;
      color: #fbbf24;
      min-height: 18px;
    }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    .empty {
      text-align: center;
      padding: 48px 20px;
      background: #111827;
      border-radius: 18px;
      color: #cbd5e1;
    }
    @media (max-width: 600px) {
      h1 { font-size: 26px; }
      .player-photo { height: 190px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>IPL Auction Dashboard</h1>
      <p class="subtext">
        Browse players, filter by team or role, check strike rates, and place competitive bids.
        Every new bid must be higher than the current highest bid for that player.
      </p>
    </section>

    <section class="filters">
      <div class="field">
        <label for="search">Search player</label>
        <input id="search" type="text" placeholder="Type player name" />
      </div>
      <div class="field">
        <label for="team">Team</label>
        <select id="team">
          <option value="">All teams</option>
        </select>
      </div>
      <div class="field">
        <label for="role">Role</label>
        <select id="role">
          <option value="">All roles</option>
        </select>
      </div>
      <div class="field">
        <label for="minSr">Min strike rate</label>
        <input id="minSr" type="number" placeholder="e.g. 130" />
      </div>
      <div class="field">
        <label for="maxSr">Max strike rate</label>
        <input id="maxSr" type="number" placeholder="e.g. 180" />
      </div>
      <div class="field">
        <label for="sort">Sort</label>
        <select id="sort">
          <option value="name_asc">Name A-Z</option>
          <option value="sr_desc">Strike rate high-low</option>
          <option value="sr_asc">Strike rate low-high</option>
        </select>
      </div>
    </section>

    <div class="toolbar">
      <div class="count" id="resultCount">Loading players...</div>
      <button id="resetBtn" type="button">Reset filters</button>
    </div>

    <section id="playerGrid" class="grid"></section>
  </div>

  <script>
    const playerGrid = document.getElementById('playerGrid');
    const resultCount = document.getElementById('resultCount');

    const searchInput = document.getElementById('search');
    const teamSelect = document.getElementById('team');
    const roleSelect = document.getElementById('role');
    const minSrInput = document.getElementById('minSr');
    const maxSrInput = document.getElementById('maxSr');
    const sortSelect = document.getElementById('sort');
    const resetBtn = document.getElementById('resetBtn');

    async function loadFilters() {
      const response = await fetch('/api/filters');
      const data = await response.json();

      data.teams.forEach(team => {
        const option = document.createElement('option');
        option.value = team;
        option.textContent = team;
        teamSelect.appendChild(option);
      });

      data.roles.forEach(role => {
        const option = document.createElement('option');
        option.value = role;
        option.textContent = role;
        roleSelect.appendChild(option);
      });
    }

    function getQueryParams() {
      const params = new URLSearchParams();
      if (searchInput.value.trim()) params.set('search', searchInput.value.trim());
      if (teamSelect.value) params.set('team', teamSelect.value);
      if (roleSelect.value) params.set('role', roleSelect.value);
      if (minSrInput.value) params.set('min_sr', minSrInput.value);
      if (maxSrInput.value) params.set('max_sr', maxSrInput.value);
      if (sortSelect.value) params.set('sort', sortSelect.value);
      return params.toString();
    }

    function formatCurrency(value) {
      return new Intl.NumberFormat('en-IN', {
        style: 'currency',
        currency: 'INR',
        maximumFractionDigits: 2,
      }).format(value || 0);
    }

    function renderPlayers(players) {
      resultCount.textContent = `${players.length} player${players.length === 1 ? '' : 's'} found`;

      if (!players.length) {
        playerGrid.innerHTML = '<div class="empty">No players match the current filters.</div>';
        return;
      }

      playerGrid.innerHTML = players.map(player => `
        <article class="card">
          <img class="player-photo" src="${player.photo_url}" alt="${player.name}" />
          <div class="content">
            <div class="name-row">
              <h2 class="player-name">${player.name}</h2>
              <span class="chip">${player.team}</span>
            </div>

            <div class="meta">
              <div class="meta-box">
                <small>Role</small>
                <strong>${player.role}</strong>
              </div>
              <div class="meta-box">
                <small>Strike Rate</small>
                <strong>${player.strike_rate}</strong>
              </div>
              <div class="meta-box" style="grid-column: 1 / -1;">
                <small>Current Highest Bid</small>
                <strong id="highest-${player.id}">${formatCurrency(player.highest_bid)}</strong>
              </div>
            </div>

            <form class="bid-form" onsubmit="submitBid(event, ${player.id})">
              <input type="text" id="bidder-${player.id}" placeholder="Bidder name" />
              <input type="number" id="amount-${player.id}" min="1" step="0.01" placeholder="Enter bid amount" required />
              <button type="submit">Place Bid</button>
              <div class="inline-note" id="message-${player.id}">Next bid must be higher than ${formatCurrency(player.highest_bid)}.</div>
            </form>
          </div>
        </article>
      `).join('');
    }

    async function loadPlayers() {
      resultCount.textContent = 'Loading players...';
      const response = await fetch(`/api/players?${getQueryParams()}`);
      const data = await response.json();
      renderPlayers(data);
    }

    async function submitBid(event, playerId) {
      event.preventDefault();
      const bidderInput = document.getElementById(`bidder-${playerId}`);
      const amountInput = document.getElementById(`amount-${playerId}`);
      const message = document.getElementById(`message-${playerId}`);
      const highestEl = document.getElementById(`highest-${playerId}`);

      message.textContent = 'Submitting bid...';
      message.className = 'inline-note';

      const response = await fetch(`/api/bid/${playerId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          bidder_name: bidderInput.value,
          amount: amountInput.value,
        }),
      });

      const data = await response.json();

      if (!response.ok) {
        message.textContent = data.error || 'Unable to place bid.';
        message.className = 'inline-note error';
        return;
      }

      highestEl.textContent = formatCurrency(data.highest_bid);
      message.textContent = data.message;
      message.className = 'inline-note success';
      amountInput.value = '';
      await loadPlayers();
    }

    const debouncedLoad = (() => {
      let timeout;
      return () => {
        clearTimeout(timeout);
        timeout = setTimeout(loadPlayers, 250);
      };
    })();

    [searchInput, teamSelect, roleSelect, minSrInput, maxSrInput, sortSelect].forEach(element => {
      element.addEventListener('input', debouncedLoad);
      element.addEventListener('change', loadPlayers);
    });

    resetBtn.addEventListener('click', () => {
      searchInput.value = '';
      teamSelect.value = '';
      roleSelect.value = '';
      minSrInput.value = '';
      maxSrInput.value = '';
      sortSelect.value = 'name_asc';
      loadPlayers();
    });

    async function init() {
      await loadFilters();
      await loadPlayers();
    }

    init();
  </script>
</body>
</html>
